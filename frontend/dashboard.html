<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SST - Sistema de Saúde e Segurança</title>
  </head>
  <body class="bg-slate-50/50 text-slate-800 font-sans h-screen flex overflow-hidden">
    
    <!-- Sidebar Premium -->
    <aside class="w-[280px] bg-white border-r border-slate-200/60 flex flex-col z-20 shrink-0 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
      
      <!-- Cabeçalho Sidebar -->
      <div class="h-24 flex items-center px-8 border-b border-slate-100/80">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-600/20">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
          </div>
          <h2 class="text-xl font-bold text-slate-900 tracking-tight">SST Pro</h2>
        </div>
      </div>
      
      <!-- Menu de Navegação -->
      <nav class="flex-1 overflow-y-auto p-5 space-y-1.5 scrollbar-hide">
        
        <p class="px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4 mt-2">Menu Principal</p>

        <button data-page="dashboard" class="nav-item active w-full flex items-center gap-3.5 px-3 py-2.5 rounded-xl font-medium transition-all text-left">
          <svg class="w-5 h-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
          <span class="text-sm">Visão Geral</span>
        </button>
        
        <button data-page="empresas" class="nav-item w-full flex items-center gap-3.5 px-3 py-2.5 rounded-xl font-medium transition-all text-left text-slate-500 hover:bg-slate-50 hover:text-indigo-600">
          <svg class="w-5 h-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
          <span class="text-sm">Empresas</span>
        </button>

        <button data-page="funcionarios" class="nav-item w-full flex items-center gap-3.5 px-3 py-2.5 rounded-xl font-medium transition-all text-left text-slate-500 hover:bg-slate-50 hover:text-indigo-600">
          <svg class="w-5 h-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
          <span class="text-sm">Funcionários</span>
        </button>

        <p class="px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4 mt-8">Controle</p>

        <button data-page="documentos" class="nav-item w-full flex items-center gap-3.5 px-3 py-2.5 rounded-xl font-medium transition-all text-left text-slate-500 hover:bg-slate-50 hover:text-indigo-600">
          <svg class="w-5 h-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
          <span class="text-sm">Documentos</span>
        </button>

        <button data-page="treinamentos" class="nav-item w-full flex items-center gap-3.5 px-3 py-2.5 rounded-xl font-medium transition-all text-left text-slate-500 hover:bg-slate-50 hover:text-indigo-600">
          <svg class="w-5 h-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"></path></svg>
          <span class="text-sm">Treinamentos</span>
        </button>

        <button data-page="asos" class="nav-item w-full flex items-center gap-3.5 px-3 py-2.5 rounded-xl font-medium transition-all text-left text-slate-500 hover:bg-slate-50 hover:text-indigo-600">
          <svg class="w-5 h-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
          <span class="text-sm">ASOs</span>
        </button>

        <button data-page="epis" class="nav-item w-full flex items-center gap-3.5 px-3 py-2.5 rounded-xl font-medium transition-all text-left text-slate-500 hover:bg-slate-50 hover:text-indigo-600">
          <svg class="w-5 h-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
          <span class="text-sm">EPIs</span>
        </button>

        <button data-page="acidentes" class="nav-item w-full flex items-center gap-3.5 px-3 py-2.5 rounded-xl font-medium transition-all text-left text-slate-500 hover:bg-slate-50 hover:text-indigo-600">
          <svg class="w-5 h-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
          <span class="text-sm">Acidentes</span>
        </button>
      </nav>

      <!-- Footer Sidebar -->
      <div class="p-6 border-t border-slate-100/80">
        <div class="flex items-center gap-3 mb-6 px-2">
          <div class="w-9 h-9 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center shrink-0">
            <span class="text-xs font-bold text-slate-600">AD</span>
          </div>
          <div>
            <p class="text-sm font-semibold text-slate-900">Administrador</p>
            <p class="text-[11px] text-slate-500">admin@sst.com</p>
          </div>
        </div>
        <button id="logout-btn" class="w-full flex items-center justify-center gap-2 px-4 py-2.5 text-sm font-medium text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-xl transition-all border border-transparent hover:border-red-100">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          Sair da Conta
        </button>
      </div>
    </aside>

    <!-- Global Modal Container -->
    <div id="modal-container" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
      <div id="modal-content" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden transform scale-95 transition-transform duration-300">
        <!-- O conteúdo será injetado aqui -->
      </div>
    </div>

    <!-- Conteúdo Principal -->
    <main id="main-content" class="flex-1 overflow-y-auto relative">
      <!-- Fundo decorativo sutil -->
      <div class="absolute top-0 left-0 w-full h-96 bg-gradient-to-b from-indigo-50/50 to-transparent -z-10 pointer-events-none"></div>
      
      <div id="page-container" class="min-h-full">
        <!-- O conteúdo será injetado aqui pelo dashboard.js -->
      </div>
    </main>

    <style>
      /* Esconder scrollbar na sidebar para ficar mais limpo */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }

      /* Estilo Premium para o item ativo no menu */
      .nav-item.active {
        background-color: #EEF2FF !important; /* indigo-50 */
        color: #4F46E5 !important; /* indigo-600 */
        font-weight: 600 !important;
      }
      .nav-item.active svg {
        opacity: 1 !important;
        color: #4F46E5 !important;
      }
    </style>

    <script type="module" src="/src/dashboard.js"></script>
  </body>
</html>
