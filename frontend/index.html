<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SST - Login</title>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body class="bg-slate-50 text-slate-900 h-screen w-screen flex items-center justify-center font-sans relative">
    
    <!-- Este é o nosso "Card" (cartão) principal onde fica o formulário -->
    <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200 w-full max-w-md">
      
      <!-- Cabeçalho do Login -->
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-slate-900">Sistema SST</h1>
        <p class="text-slate-500 mt-2">Faça login para acessar o painel administrativo</p>
      </div>

      <!-- Formulário de Login -->
      <form id="login-form" class="space-y-4">
        
        <!-- Campo E-mail -->
        <div>
          <label for="email" class="block text-sm font-medium text-slate-900 mb-1">E-mail</label>
          <input type="email" id="email" required 
                 class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-600 focus:ring-1 focus:ring-indigo-600 transition-colors" 
                 placeholder="admin@sst.com.br">
        </div>
        
        <!-- Campo Senha -->
        <div>
          <label for="password" class="block text-sm font-medium text-slate-900 mb-1">Senha</label>
          <input type="password" id="password" required 
                 class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-600 focus:ring-1 focus:ring-indigo-600 transition-colors" 
                 placeholder="••••••••">
        </div>

        <!-- Botão de Entrar -->
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition-colors shadow-sm mt-6">
          Entrar
        </button>
      </form>

      <!-- Botão discreto para alterar credenciais -->
      <div class="mt-6 text-center">
        <button type="button" id="open-change-credentials-btn" class="text-sm text-slate-400 hover:text-indigo-600 transition-colors">
          Deseja alterar as credenciais de acesso?
        </button>
      </div>
    </div>

    <!-- Modal de Alteração de Credenciais (Inicia escondido com a classe 'hidden') -->
    <div id="credentials-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50">
      
      <!-- Caixa do Modal -->
      <div class="bg-white p-8 rounded-xl shadow-xl border border-slate-200 w-full max-w-md mx-4">
        
        <!-- Cabeçalho do Modal -->
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-bold text-slate-900">Alterar Credenciais</h2>
          
          <!-- Botão de Fechar Modal (X) -->
          <button type="button" id="close-modal-btn" class="text-slate-400 hover:text-slate-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>

        <!-- Formulário de Mudança de Credenciais -->
        <form id="change-credentials-form" class="space-y-4">
          
          <!-- Confirmação das credenciais atuais -->
          <div class="bg-slate-50 p-4 rounded-lg border border-slate-100 mb-4 space-y-4">
            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Confirme sua identidade</p>
            <div>
              <label for="current-email" class="block text-sm font-medium text-slate-900 mb-1">E-mail Atual</label>
              <input type="email" id="current-email" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-600 focus:ring-1 focus:ring-indigo-600 text-sm">
            </div>
            <div>
              <label for="current-password" class="block text-sm font-medium text-slate-900 mb-1">Senha Atual</label>
              <input type="password" id="current-password" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-600 focus:ring-1 focus:ring-indigo-600 text-sm">
            </div>
          </div>
          
          <!-- Entrada para as Novas credenciais -->
          <div class="pt-2 space-y-4">
            <div>
              <label for="new-email" class="block text-sm font-medium text-slate-900 mb-1">Novo E-mail</label>
              <input type="email" id="new-email" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-sm">
            </div>
            <div>
              <label for="new-password" class="block text-sm font-medium text-slate-900 mb-1">Nova Senha</label>
              <input type="password" id="new-password" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-sm">
            </div>
          </div>

          <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-2.5 rounded-lg transition-colors mt-6">
            Confirmar Alteração
          </button>
        </form>
      </div>
    </div>

    <!-- Importando o JavaScript principal -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
